services:
  graph-viewer:
    build: .
    command: [ "python", "viewer.py" ]
    ports:
      - "8080:8080"
    volumes:
      - C:\data:/app/data
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - REGISTRY_PATH=data/ontologies/registry.json
      - REVIEW_MODE=pending
    extra_hosts:
      - "host.docker.internal:host-gateway"
